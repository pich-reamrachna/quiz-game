pre-commit:
  parallel: true
  commands:
    format:
      glob: "quiz-game/*.{js,ts,svelte,json,md,css,scss,yml,yaml,html}"
      run: cd quiz-game && npx prettier --write {staged_files}
      stage_fixed: true
    lint_fix:
      glob: "quiz-game/*.{js,ts,svelte}"
      run: cd quiz-game && npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      run: cd quiz-game && npm run check
    spell:
      run: cd quiz-game && npm run spell .
    audit:
      run: cd quiz-game && npm audit --audit-level=moderate
    lint:
      run: cd quiz-game && npm run lint
    test:
      run: cd quiz-game && npm run test
