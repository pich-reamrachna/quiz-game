pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "quiz-game/*.{js,ts,svelte,json,md,css,scss,yml,yaml,html}"
      run: pnpm --dir quiz-game exec prettier --check --ignore-unknown {staged_files}
    
    eslint_check:
      glob: "quiz-game/*.{js,ts,svelte}"
      run: pnpm --dir quiz-game exec eslint --quiet --cache --cache-strategy content {staged_files}
    
    audit:
      run: pnpm --dir quiz-game audit
    
    spell:
      run: pnpm --dir quiz-game exec cspell --no-progress {staged_files}

pre-push:
  parallel: true
  commands:
    check:
      run: pnpm --dir quiz-game run check
    
    test:
      run: pnpm --dir quiz-game run test

