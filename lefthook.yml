pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,ts,svelte,json,md,css,scss,yml,yaml,html}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{js,ts,svelte}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      run: npm run check
    test:
      run: npm run test
